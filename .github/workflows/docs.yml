name: Generate Doxygen Documentation

on:
  push:
    branches:
      - master # Triggers on changes to the default master branch

permissions:
  contents: write # Needed to allow the script to push documentation to your gh-pages branch

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Install modern Doxygen and Graphviz
      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install doxygen graphviz -y

      # 3. Generate the Doxyfile template if needed, or use existing config
      # Note: We append settings to ensure Graphviz diagrams are forced ON.
      - name: Configure and Run Doxygen
        run: |
          if [ ! -f Doxyfile ]; then
            doxygen -g Doxyfile
          fi
          echo "OUTPUT_DIRECTORY       = docs_output" >> Doxyfile
          echo "HAVE_DOT               = YES" >> Doxyfile
          echo "DOT_NUM_THREADS        = 4" >> Doxyfile
          echo "CLASS_GRAPH            = YES" >> Doxyfile
          echo "COLLABORATION_GRAPH    = YES" >> Doxyfile
          echo "INCLUDE_GRAPH          = YES" >> Doxyfile
          echo "INCLUDED_BY_GRAPH      = YES" >> Doxyfile
          echo "DOT_IMAGE_FORMAT       = svg" >> Doxyfile
          echo "INTERACTIVE_SVG        = YES" >> Doxyfile
          doxygen Doxyfile

      # 4. Prevent GitHub Pages from skipping Doxygen internal folders
      - name: Add .nojekyll bypass
        run: touch docs_output/html/.nojekyll

      # 5. Deploy the generated documentation folder to the gh-pages branch
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs_output/html
          branch: gh-pages
