name: Generate Documentation

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install doxygen graphviz -y

      - name: Configure and Run Doxygen
        run: |
          # 1. Verify file presence before attempting execution
          if [ ! -f MathPlot.doxyfile ]; then
            echo "ERROR: Target Doxygen control file not found at MathPlot.doxyfile
            exit 1
          fi

          # 2. Append pipeline bypass rule to override output targets safely
          # This forces documentation to route directly into our standard deployment folder
          echo "OUTPUT_DIRECTORY       = docs_output" >>MathPlot.doxyfile
          
          # 3. Compile documentation utilizing your exact native repository layout rules
          doxygen MathPlot.doxyfile

      - name: Add .nojekyll bypass
        run: touch docs_output/html/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs_output/html
          branch: gh-pages
