name: Build Windows Demo (wxFormbuilder version) Debug

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-demo-debug:
    name: Build Debug x64 demo
    runs-on: windows-latest

    env:
      WX_VERSION: v3.2.2
      WXWIN: ${{ github.workspace }}\_deps\wxWidgets
      wxWidgets: ${{ github.workspace }}\_deps\wxWidgets
      wxDir: ${{ github.workspace }}\_deps\wxWidgets
      SOLUTION: MathPlotDemo\wxPlotDemo_wxFormBuilder_Windows.sln
      CONFIGURATION: Debug
      PLATFORM: x64

    steps:
      - name: Checkout wxMathPlot
        uses: actions/checkout@v4

      - name: Configure MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Prepare artifact directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          New-Item -ItemType Directory -Force artifacts\logs | Out-Null
          New-Item -ItemType Directory -Force artifacts\bin | Out-Null

      - name: Cache wxWidgets Debug x64 build
        id: cache-wxwidgets
        uses: actions/cache@v4
        with:
          path: ${{ env.WXWIN }}
          key: wxwidgets-${{ runner.os }}-${{ env.WX_VERSION }}-v143-debug-x64

      - name: Checkout wxWidgets
        if: steps.cache-wxwidgets.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git clone --depth 1 --branch $env:WX_VERSION https://github.com/wxWidgets/wxWidgets.git $env:WXWIN

      - name: Build wxWidgets Debug x64 static libraries
        if: steps.cache-wxwidgets.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          msbuild "$env:WXWIN\build\msw\wx_vc17.sln" `
            /m `
            /p:Configuration=Debug `
            /p:Platform=x64 `
            /flp:logfile=artifacts\logs\wxwidgets-msbuild.log;verbosity=normal `
            /bl:artifacts\logs\wxwidgets-msbuild.binlog

      - name: Build wxMathPlot demo Debug x64
        shell: pwsh
        run: |
          msbuild "$env:SOLUTION" `
            /m `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform=$env:PLATFORM `
            /flp:logfile=artifacts\logs\wxmathplot-msbuild.log;verbosity=diagnostic `
            /bl:artifacts\logs\wxmathplot-msbuild.binlog

      - name: Collect executable
        if: success()
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter "wxPlotDemo_wxFormBuilder_Windows.exe" | Select-Object -First 1

          if (-not $exe) {
            Write-Error "Build succeeded, but wxPlotDemo_wxFormBuilder_Windows.exe was not found."
          }

          Copy-Item $exe.FullName artifacts\bin\

          $pdb = [System.IO.Path]::ChangeExtension($exe.FullName, ".pdb")
          if (Test-Path $pdb) {
            Copy-Item $pdb artifacts\bin\
          }

          "Executable: $($exe.FullName)" | Tee-Object -FilePath artifacts\logs\build-output.txt

      - name: Upload executable artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wxMathPlot-Windows-Demo-Debug-x64
          path: artifacts/bin/*

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wxMathPlot-Windows-Demo-Debug-x64-build-logs
          path: artifacts/logs/*
